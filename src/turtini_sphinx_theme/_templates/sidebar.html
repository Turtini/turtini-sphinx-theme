    <img src="{{ pathto('_static/' + logo, 1) }}" class="logo" alt="{{ project }}" />
  {% endif %}
  {{ project }}
</a>

<div class="turtini-sidebar-links">
  <ul>
    <li><a href="https://turtini.com/" target="_blank" rel="noopener">Turtini</a></li>

    <li><a href="https://turtini.github.io/" target="_blank" rel="noopener">GitHub</a></li>
    <li><a href="https://turtini.com/whitepapers" target="_blank" rel="noopener">White Papers</a></li>
    <li><a href="https://turtini.com/events" target="_blank" rel="noopener">Events</a></li>
    <li><a href="https://trident.turtini.com/login" target="_blank" rel="noopener">Trident</a></li>
  </ul>
</div>
{% endblock %}

{% block menu %}
  {{ super() }}
{% endblock %}
